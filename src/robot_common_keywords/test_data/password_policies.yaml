# Reusable password policy presets consumed by Validate Password Field.
# Adding a new policy = adding an entry under `policies:`. Zero code change.
#
# Recognized keys (all optional; missing = not enforced):
#   min_length               (int)   — minimum character count
#   max_length               (int)   — maximum character count (0 = unlimited)
#   require_uppercase        (bool)  — at least one A-Z
#   require_lowercase        (bool)  — at least one a-z
#   require_number           (bool)  — at least one 0-9
#   require_special          (bool)  — at least one non-alphanumeric
#   forbid_common_passwords  (bool)  — reject the top-N common passwords
#   forbid_sequential_chars  (bool)  — reject runs like "abc", "123"
#   forbid_username_substring (bool) — reject passwords containing the username

policies:

  basic:
    min_length: 8
    require_uppercase: true
    require_number: true
    require_special: false

  strong:
    min_length: 12
    require_uppercase: true
    require_lowercase: true
    require_number: true
    require_special: true
    forbid_common_passwords: true

  banking:
    min_length: 14
    require_uppercase: true
    require_lowercase: true
    require_number: true
    require_special: true
    forbid_username_substring: true
    forbid_sequential_chars: true
