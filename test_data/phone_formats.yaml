# Country-keyed phone-format rules used by Validate Phone Field.
# Add a new country by appending a new entry under `countries:` — no code
# changes required.
#
# Schema:
#   universal_invalid_samples (top level): cross-cutting negatives every
#     shape-style validator should reject (letters, special chars, Unicode
#     digits, SQLi/XSS payloads, etc.). Cycled by Validate Phone Field when
#     include_universal=${True} (default). Optional — defaults to empty list
#     for backward compatibility.
#
#   countries.<ISO>:
#     min_length:                 minimum digit count the app accepts
#     max_length:                 maximum digit count the app accepts
#     prefix:                     E.164 prefix, e.g. "+84"
#     valid_samples:              numbers the app MUST accept (≥1)
#     invalid_samples:            shape failures the app MUST reject (≥1)
#     country_rule_invalid_samples: optional — country-rule violations (e.g.
#       wrong VN mobile prefix). Cycled only by Validate Phone Country Rule
#       Violations, against an app/fixture that enforces R007–R009.

universal_invalid_samples:
  # Letters / vanity numbers (R006)
  - "abc-def-ghij"
  - "1800-FLOWERS"
  # Special / structural characters (R006, R014)
  - "@@@###$$$"
  - "123|456/789"
  # Random separators not in the allowed set (R004)
  - "12.34.56.78.90"
  # Below universal minimum length (R002 — 7 digits)
  - "12345"
  # Bracket-only / formatting noise (R002)
  - "()()()"
  # Security payloads (R014)
  - "'; DROP TABLE users"
  - "<script>alert()"
  # Unicode digit variants (R013)
  - "٩٨٧٦٥٤٣٢١٠"
  - "１２３４５６７８９０"


countries:

  VN:
    min_length: 9
    max_length: 13
    prefix: "+84"
    valid_samples:
      - "+84 903 123 456"
      - "0903123456"
      - "+84 789 456 123"
      - "0812 345 678"
      - "0594 567 890"
    invalid_samples:
      - "abc"
      - "notaphone"
    # R007: VN mobile pattern ^(\+84|0)(3[2-9]|5[6-9]|7[06-9]|8[1-9]|9[0-9])\d{7}$
    country_rule_invalid_samples:
      - "0234567890"     # wrong prefix 02x
      - "090123456"      # only 9 digits
      - "09012345678"    # 11 digits — old format

  US:
    min_length: 10
    max_length: 14
    prefix: "+1"
    valid_samples:
      - "(212) 555-1234"
      - "+1 415 555 2671"
      - "800-555-0100"
      - "2125551234"
      - "+1 604 555 0198"
    invalid_samples:
      - "abc"
      - "phonenumber"
    # R008: NANP — area code must start [2-9], no 000.
    country_rule_invalid_samples:
      - "(000) 555-1234"
      - "0000000000"
      - "1111111111"

  UK:
    min_length: 10
    max_length: 13
    prefix: "+44"
    valid_samples:
      - "+44 7700 900123"
      - "+44 20 7946 0958"
      - "02012345678"
      - "+442012345678"
    invalid_samples:
      - "abc"
      - "not-a-number"
    # R009: UK mobile must be 07xxx — so +44 1700 ... is invalid for mobile.
    country_rule_invalid_samples:
      - "+44 1700 900123"

  DE:
    min_length: 10
    max_length: 14
    prefix: "+49"
    valid_samples:
